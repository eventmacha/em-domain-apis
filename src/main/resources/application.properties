# ==============================================================================
# Event Macha – Quarkus Backend Configuration
# ==============================================================================

# ------------------------------------------------------------------------------
# Application
# ------------------------------------------------------------------------------
quarkus.application.name=em-domain-apis
quarkus.application.version=1.0.0

# ------------------------------------------------------------------------------
# AWS Region
# ------------------------------------------------------------------------------
quarkus.dynamodb.aws.region=${AWS_REGION:ap-south-1}
quarkus.dynamodb.aws.credentials.type=default

# Local dev overrides (uncomment when running against DynamoDB Local)
# %dev.quarkus.dynamodb.endpoint-override=http://localhost:8000
# %dev.quarkus.dynamodb.aws.credentials.type=static
# %dev.quarkus.dynamodb.aws.credentials.static-provider.access-key-id=local
# %dev.quarkus.dynamodb.aws.credentials.static-provider.secret-access-key=local

# ------------------------------------------------------------------------------
# DynamoDB Table Names  (injected via Lambda environment variables)
# ------------------------------------------------------------------------------
event-macha.tables.users=${EVENT_MACHA_USERS_TABLE_NAME:Users}
event-macha.tables.rate-cards=${EVENT_MACHA_RATE_CARDS_TABLE_NAME:RateCards}
event-macha.tables.rate-card-plans=${EVENT_MACHA_RATE_CARD_PLANS_TABLE_NAME:RateCardPlans}
event-macha.tables.orders=${EVENT_MACHA_ORDERS_TABLE_NAME:Orders}
event-macha.tables.payments=${EVENT_MACHA_PAYMENTS_TABLE_NAME:Payments}
event-macha.tables.payment-history=${EVENT_MACHA_PAYMENT_HISTORY_TABLE_NAME:PaymentHistory}
event-macha.tables.publish=${EVENT_MACHA_PUBLISH_TABLE_NAME:Publish}
event-macha.tables.publish-history=${EVENT_MACHA_PUBLISH_HISTORY_TABLE_NAME:PublishHistory}

# ------------------------------------------------------------------------------
# Cognito
# ------------------------------------------------------------------------------
event-macha.cognito.region=${COGNITO_REGION:ap-south-1}
event-macha.cognito.user-pool-id=${COGNITO_USER_POOL_ID:ap-south-1_XXXXXXXXX}

# ------------------------------------------------------------------------------
# Razorpay
# ------------------------------------------------------------------------------
event-macha.razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
event-macha.razorpay.key-secret=${RAZORPAY_KEY_SECRET:placeholder_secret}
event-macha.razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:placeholder_webhook_secret}
event-macha.razorpay.base-url=https://api.razorpay.com/v1

# ------------------------------------------------------------------------------
# SES Email
# ------------------------------------------------------------------------------
event-macha.ses.sender=${SES_SENDER_EMAIL:noreply@eventmacha.com}
event-macha.ses.region=${SES_REGION:ap-south-1}

# ------------------------------------------------------------------------------
# OpenAPI / Swagger
# ------------------------------------------------------------------------------
quarkus.smallrye-openapi.info-title=Event Macha API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description= API for the Event Macha platform
quarkus.smallrye-openapi.info-contact-email=support@eventmacha.com
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# ------------------------------------------------------------------------------
# Logging
# ------------------------------------------------------------------------------
quarkus.log.level=INFO
quarkus.log.category."com.eventmacha".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.console.json=false

# Production JSON logging
%prod.quarkus.log.console.json=true
%prod.quarkus.log.console.json.pretty-print=false

# ------------------------------------------------------------------------------
# HTTP (local dev only – Lambda does not use embedded HTTP server)
# ------------------------------------------------------------------------------
%dev.quarkus.http.port=8081
%dev.quarkus.http.cors=true
%dev.quarkus.http.cors.origins=*
%dev.quarkus.devservices.enabled=false
%test.quarkus.devservices.enabled=false
%prod.quarkus.devservices.enabled=false

# Workaround for terminal issues in Windows IDEs during dev mode
%dev.quarkus.test.continuous-testing=disabled

# ------------------------------------------------------------------------------
# Bean Validation
# ------------------------------------------------------------------------------
quarkus.hibernate-validator.fail-fast=false

